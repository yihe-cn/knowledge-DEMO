services:
  mysql:
    image: mysql:8.0
    container_name: simugo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: simugo
      MYSQL_DATABASE: simugo_kb
      MYSQL_USER: simugo
      MYSQL_PASSWORD: simugo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-usimugo", "-psimugo"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: simugo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:
  redis-data:
